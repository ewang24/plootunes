services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plootunes
      POSTGRES_USER: plootunes
      POSTGRES_PASSWORD: plootunes
    volumes:
      - e2e_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plootunes -d plootunes"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ../..
      dockerfile: plootunes/docker/Dockerfile.server
      args:
        PLOOTUNES_UID: ${PLOOTUNES_UID:-1001}
        PLOOTUNES_GID: ${PLOOTUNES_GID:-1001}
    environment:
      DATABASE_URL: postgres://plootunes:plootunes@postgres:5432/plootunes
      MEDIA_ROOT: /app/media
      COVERS_DIR: /app/covers
      COVERS_PUBLIC_PATH: /covers
      PORT: 3000
      NODE_ENV: development
      PLOOTUNES_AUTH_BYPASS: "true"
      PLOOTUNES_E2E_USER_ID: "00000000-0000-0000-0000-000000000001"
      SCENARIO: ${SCENARIO:-}
      E2E_SKIP_SEED: ${E2E_SKIP_SEED:-}
    volumes:
      - ../e2e:/app/e2e:ro
      - ./entrypoint.e2e.sh:/app/entrypoint.e2e.sh:ro
      - e2e_covers:/app/covers
    entrypoint: ["sh", "/app/entrypoint.e2e.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ../..
      dockerfile: plootunes/docker/Dockerfile.client
    ports:
      - "3100:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  e2e_postgres_data:
  e2e_covers:
